name: Playwright Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to run against
        required: true
        default: test
        type: choice
        options:
          - dev
          - test
          - qa
          - stage
      browser:
        description: Browser project to execute
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

jobs:
  playwright:
    name: Run Sauce Demo Tests (${{ github.event.inputs.environment || 'test' }}, ${{ github.event.inputs.browser || 'chromium' }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      TEST_ENV: ${{ github.event.inputs.environment || 'test' }}
      BROWSER: ${{ github.event.inputs.browser || 'chromium' }}
      BASE_URL: https://www.saucedemo.com
      LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Run Playwright tests
        run: |
          TEST_FILES="tests/login.spec.ts tests/inventory.spec.ts tests/cart.spec.ts tests/checkout.spec.ts"

          if [ "$BROWSER" = "all" ]; then
            npx playwright test $TEST_FILES
          else
            npx playwright test $TEST_FILES --project="$BROWSER"
          fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
